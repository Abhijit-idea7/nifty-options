name: Live Paper Trader (Nifty Mon + Sensex Wed)

# -----------------------------------------------------------------------
# SCHEDULE:
#   Monday    → fetches live Nifty  ATM prices (NSE), trades 1DTE straddle
#   Wednesday → fetches live Sensex ATM prices (BSE), trades 1DTE straddle
#   All other weekdays → runs but skips immediately (no trade)
#
# TIMING:
#   Runs every 5 minutes, 09:15–15:30 IST (03:45–10:00 UTC)
#   Monday–Friday only
#
# HOW TO START:
#   Actions tab → "Live Paper Trader" → Run workflow → Start
#
# HOW TO STOP:
#   Actions tab → "Live Paper Trader" → three-dot menu → Disable workflow
#
# VIEW RESULTS:
#   paper_trade_log.csv      — in your repo (updates after each trade exit)
#   paper_pnl_summary.txt    — running summary (updates every tick)
#   Actions console          — live output each run
# -----------------------------------------------------------------------

on:
  schedule:
    # Every 5 min, Mon–Fri, 03:45–10:00 UTC  =  09:15–15:30 IST
    - cron: '*/5 3-10 * * 1-5'

  workflow_dispatch:
    inputs:
      signal_type:
        description: 'Signal (orb / supertrend / both)'
        default: 'orb'
        type: choice
        options: [orb, supertrend, both]
      trade_type:
        description: 'Trade structure'
        default: 'straddle'
        type: choice
        options: [straddle, strangle]
      sl_pct:
        description: 'Stop-loss % (80 for 1DTE)'
        default: '80'
      target_pct:
        description: 'Target % (50 for 1DTE)'
        default: '50'
      early_exit_time:
        description: 'Take profit by (14:00 = 2PM; 15:15 = disabled)'
        default: '14:00'
      use_vix:
        description: 'VIX filter?'
        default: 'true'
        type: choice
        options: ['true', 'false']
      vix_max:
        description: 'Max VIX for entry'
        default: '20'
      num_lots:
        description: 'Lots per instrument'
        default: '1'

jobs:
  paper-trade:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit state files back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pytz

      - name: Run paper trader tick
        env:
          SIGNAL_TYPE:     ${{ github.event.inputs.signal_type    || 'orb' }}
          TRADE_TYPE:      ${{ github.event.inputs.trade_type     || 'straddle' }}
          SL_PCT:          ${{ github.event.inputs.sl_pct         || '80' }}
          TARGET_PCT:      ${{ github.event.inputs.target_pct     || '50' }}
          EARLY_EXIT_TIME: ${{ github.event.inputs.early_exit_time || '14:00' }}
          USE_VIX:         ${{ github.event.inputs.use_vix         || 'true' }}
          VIX_MAX:         ${{ github.event.inputs.vix_max         || '20' }}
          NUM_LOTS:        ${{ github.event.inputs.num_lots         || '1' }}
        run: python paper_trader.py

      - name: Save state and results to repository
        run: |
          git config user.name  "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add -f paper_trade_state.json paper_trade_log.csv paper_pnl_summary.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "paper trade tick $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
